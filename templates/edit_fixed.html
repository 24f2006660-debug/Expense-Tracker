<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Fixed Costs</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 400px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 15px; background-color: #4CAF50; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #45a049; }
        a { margin-left: 10px; color: #008CBA; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Edit Fixed Costs</h1>
    <form method="POST">
        <label for="rent">Rent:</label>
        <input type="number" name="rent" value="{{ fixed.rent }}" required>

        <label for="eb">Electricity Bill:</label>
        <input type="number" name="eb" value="{{ fixed.eb }}" required>

        <label for="gas">Gas:</label>
        <input type="number" name="gas" value="{{ fixed.gas }}" required>

        <label for="wifi">WiFi:</label>
        <input type="number" name="wifi" value="{{ fixed.wifi }}" required>

        <button type="submit">Update Fixed Costs</button>
        <a href="{{ url_for('index') }}">Cancel</a>
    </form>
</body>
</html>
