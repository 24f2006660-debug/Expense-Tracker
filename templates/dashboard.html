<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; background:#f5f7fa; margin:0; }

        .top {
            background:#007bff;
            color:white;
            padding:15px;
            display:flex;
            justify-content:space-between;
        }

        .container { padding:20px; }

        .cards {
            display:flex;
            gap:15px;
            margin:20px 0;
        }

        .card {
            flex:1;
            padding:20px;
            border-radius:10px;
            color:white;
            text-align:center;
        }

        .fixed { background:#6c757d; }
        .variable { background:#28a745; }
        .total { background:#007bff; }

        .btn {
            padding:10px 15px;
            background:#28a745;
            color:white;
            text-decoration:none;
            border-radius:6px;
            margin:5px;
            display:inline-block;
        }

        .logout-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    padding: 6px 12px;
    font-size: 12px;
    background: #dc3545;
    color: white;
    border-radius: 5px;
    text-decoration: none;
}
.logout-btn:hover {
    background: #c82333;
}

        .charts {
            display:flex;
            gap:20px;
            flex-wrap:wrap;
        }

        .chart-box {
            background:white;
            padding:15px;
            border-radius:10px;
            flex:1;
            min-width:300px;
        }
    </style>
</head>

<body>

<div class="top">
    <h2>Expense Tracker</h2>
    <a href="{{ url_for('logout') }}" class="btn logout">Logout</a>
</div>

<div class="container">

    <!-- BUTTONS -->
    <div style="text-align:center;">
        <a href="{{ url_for('add_fixed') }}" class="btn">+ Fixed</a>
        <a href="{{ url_for('add_variable') }}" class="btn">+ Variable</a>
        <a href="{{ url_for('add_eb') }}" class="btn">+ EB</a>
        <a href="{{ url_for('add_details') }}" class="btn">+ Details</a>
        <a href="{{ url_for('view_data') }}" class="btn">📊 View Tables</a>
    </div>

    <!-- SUMMARY -->
    <div class="cards">
        <div class="card fixed">
            <h3>Fixed</h3>
            ₹{{ fixed_total_sum }}
        </div>

        <div class="card variable">
            <h3>Variable</h3>
            ₹{{ variable_total_sum }}
        </div>

        <div class="card total">
            <h3>Total</h3>
            ₹{{ overall_total_sum }}
        </div>
    </div>
    <div style="text-align:center; margin-bottom:20px;">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button onclick="filterData()" class="add-btn">Filter</button>
</div>

    <!-- CHARTS -->
    <div class="charts">
        <div class="chart-box">
            <canvas id="pieChart"></canvas>
        </div>

        <div class="chart-box">
            <canvas id="barChart"></canvas>
        </div>

        <div class="chart-box">
            <canvas id="lineChart"></canvas>
        </div>
    </div>

</div>

<script>
new Chart(document.getElementById('pieChart'), {
    type:'pie',
    data:{ labels: {{ pie_labels|tojson }}, datasets:[{data: {{ pie_data|tojson }} }] }
});

new Chart(document.getElementById('barChart'), {
    type:'bar',
    data:{ labels:['Prov','Veg','Fruits','Meat','Water','Transport','Others'],
           datasets:[{data: {{ bar_data|tojson }} }] }
});

new Chart(document.getElementById('lineChart'), {
    type:'line',
    data:{ labels: {{ line_labels|tojson }},
           datasets:[{data: {{ line_data|tojson }} }] }
});
</script>

</body>
</html>
