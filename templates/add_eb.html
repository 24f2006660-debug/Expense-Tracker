<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Electricity Reading</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .back {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Electricity Entry</h2>

    <form method="POST">
        <input type="number" name="meter_reading" placeholder="Meter Reading" required>
        <input type="number" name="slab_rate" placeholder="Slab Rate (₹ per unit)" required>

        <button type="submit">Save</button>
    </form>

    <div class="back">
        <a href="{{ url_for('index') }}">⬅ Back to Dashboard</a>
    </div>
</div>

</body>
</html>
